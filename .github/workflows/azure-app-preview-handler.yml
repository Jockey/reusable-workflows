name: Deploy Image to App Service Slot

on:
    workflow_call:
        inputs:
            app-name:
                description: "The base App Service name"
                required: true
                type: string
            app-resource-group:
                description: "Azure Resource Group for the given `app-name`"
                required: true
                type: string
            slot-name:
                description: "Name of the App Service Slot to use"
                required: true
                type: string
            custom-url-suffix:
                description: "Append after `slot-name` to add custom DNS binding. `-fe.example.com` bind `{slot-name}-fe.example.com`"
                required: false
                type: string
            image-name:
                description: "Full Docker image identifier. Format MUST be `*.azurecr.io/*``"
                required: true
                type: string
            ssl-cert-thumbprint:
                description: SSL Certificate Thumbprint. See output of  `az webapp config ssl list --resource-group $APP_RESOURCE_GROUP` and look for the Certificate for `*.$CUSTOM_URL_SUFFIX`
                required: true
                type: string
        secrets:
            AZURE_SERVICE_PRINCIPAL:
                description: Azure Service Principal Data, JSON string
                required: true
            CLOUDFLARE_API_TOKEN:
                description: Cloudflare API token, with zone-level `DNS:Read, DNS:Edit, Cache Purge:Purge` permissions
                required: true
            CLOUDFLARE_ZONE_ID:
                description: Cloudflare Zone ID to manage
                required: true
        outputs:
            deployment_url:
                description: "URL of the most recent deployment"
                value: ${{ jobs.deploy.outputs.deployment_url }}

permissions:
    contents: read
    pull-requests: write

jobs:
    deploy:
        if: github.event.action != 'closed'
        runs-on: ubuntu-latest
        outputs:
            deployment_url: ${{ steps.run_deploy.outputs.deployment_url }}
        steps:
            - name: Checkout Reusable Workflow Repo
              uses: actions/checkout@v6
              with:
                  repository: ${{ job.workflow_repository }}
                  ref: ${{ job.workflow_sha }}

            - name: Run Deploy Script
              id: run_deploy
              env:
                  AZURE_SERVICE_PRINCIPAL: ${{ secrets.AZURE_SERVICE_PRINCIPAL }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  APP_NAME: ${{ inputs.app-name }}
                  APP_RESOURCE_GROUP: ${{ inputs.app-resource-group }}
                  SLOT_NAME: ${{ inputs.slot-name }}
                  CUSTOM_URL_SUFFIX: ${{ inputs.custom-url-suffix }}
                  IMAGE_NAME: ${{ inputs.image-name }}
                  SSL_CERT_THUMBPRINT: ${{ inputs.ssl-cert-thumbprint }}
                  CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
                  # We have to download the script, despite it being in this repo.
              run: |
                  chmod +x ./scripts/bash/az-preview-site-helper.sh
                  ./scripts/bash/az-preview-site-helper.sh deploy

            - name: Add Preview URL to PR
              uses: actions/github-script@v9
              env:
                  DEPLOY_URL: ${{ steps.run_deploy.outputs.deployment_url }}
              with:
                  script: |
                      const pr_number = context.issue.number;
                      const previewUrl = '<a href="${process.env.DEPLOY_URL}" target="_blank">${process.env.DEPLOY_URL}</a>';

                      const startAnchor = '<span id="pr-preview-url-start"></span>';
                      const endAnchor = '<span id="pr-preview-url-end"></span>';

                      // Formats footer with visual horizontal rules and hidden tracking IDs
                      const footerBlock = `${startAnchor}\n---\n### 🚀 Preview URL\n${previewUrl}\n\n---\n${endAnchor}`;

                      const pr = await github.rest.pulls.get({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: pr_number,
                      });

                      let currentBody = pr.data.body || "";
                      let newBody = "";

                      if (currentBody.includes(startAnchor)) {
                        // Regex matches everything between and including the specific span elements
                        const regex = new RegExp(startAnchor+'[\\s\\S]*?'+endAnchor, 'g');
                        newBody = currentBody.replace(regex, footerBlock);
                      } else {
                        // Append to footer
                        newBody = currentBody ? `${currentBody}\n\n${footerBlock}` : footerBlock;
                      }

                      await github.rest.pulls.update({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: pr_number,
                        body: newBody
                      });

    cleanup:
        if: github.event.action == 'closed'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Reusable Workflow Repo
              uses: actions/checkout@v6
              with:
                  repository: ${{ job.workflow_repository }}
                  ref: ${{ job.workflow_sha }}

            - name: Run Cleanup Script
              env:
                  AZURE_SERVICE_PRINCIPAL: ${{ secrets.AZURE_SERVICE_PRINCIPAL }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  APP_NAME: ${{ inputs.app-name }}
                  APP_RESOURCE_GROUP: ${{ inputs.app-resource-group }}
                  SLOT_NAME: ${{ inputs.slot-name }}
                  CUSTOM_URL_SUFFIX: ${{ inputs.custom-url-suffix }}
                  IMAGE_NAME: ${{ inputs.image-name }}
                  SSL_CERT_THUMBPRINT: ${{ inputs.ssl-cert-thumbprint }}
                  CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
              # We have to download the script, despite it being in this repo.
              run: |
                  chmod +x ./scripts/bash/az-preview-site-helper.sh
                  ./scripts/bash/az-preview-site-helper.sh cleanup
