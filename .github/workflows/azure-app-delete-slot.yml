name: Delete App Service Slot

on:
    workflow_call:
        inputs:
            app-resource-group:
                description: "Target App Service Azure Resource Group"
                required: true
                type: string
            app-name:
                description: "Name of the Azure Web App"
                required: true
                type: string
            slot-to-delete:
                description:
                    "Name of the App Service Slot to delete"
                required: true
                type: string
        secrets:
            AZURE_CREDENTIALS:
                description: "Azure Service Principal Credentials to use"
                required: true


jobs:
    delete_slot:
        name: Delete Slot
        runs-on: ubuntu-latest
        steps:
            - name: Log in to Azure
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Delete Azure App Service Slot
              uses: azure/CLI@v2
              with:
                  inlineScript: |
                      az webapp slot delete \
                        --name ${{ inputs.app-name }} \
                        --resource-group ${{ inputs.app-resource-group }} \
                        --slot ${{ inputs.slot-to-delete }} \
                        --yes
