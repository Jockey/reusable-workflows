name: Deploy Image to App Service Slot

on:
    workflow_call:
        inputs:
            app-resource-group:
                description: "Target Azure Resource Group"
                required: true
                type: string
            app-name:
                description: "The base production/staging App Service name"
                required: true
                type: string
            image-name:
                description:
                    "Full Docker image identifier passed from the build workflow (e.g., registry.azurecr.io/repo:tag)"
                required: true
                type: string
            slot:
                description:
                    "Name of the App Service Slot to use"
                required: true
                type: string
        outputs:
            deployment_url: 
                description: "URL of the most recent deployment"
                value: ${{ jobs.deploy.outputs.deployment_url }}
        secrets:
            AZURE_CREDENTIALS:
                required: true

jobs:
    deploy:
        if: github.event.action != 'closed'
        runs-on: ubuntu-latest
        outputs:
            deployment_url: ${{ steps.expose_deployment_url.outputs.deployment_url }}
        steps:
            - name: Log in to Azure
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            # Create slot if it doesn't exist; syncs configuration from parent app
            - name: Create Azure App Service Slot
              uses: azure/CLI@v2
              with:
                  inlineScript: |
                      az webapp slot create \
                        --name ${{ inputs.app-name }} \
                        --resource-group ${{ inputs.app-resource-group }} \
                        --slot ${{ inputs.slot }} \
                        --configuration-source ${{ inputs.app-name }}

            - name: Deploy Container to Slot
              uses: azure/webapps-deploy@v3
              with:
                  app-name: ${{ inputs.app-name }}
                  slot-name: ${{ inputs.slot }}
                  images: ${{ inputs.image-name }}

            - name: Expose Deployment URL
              id: expose_deployment_url
              run: |
                echo "deployment_url=$(echo https://${{ inputs.app-name }}-${{ inputs.slot }}.azurewebsites.net)" >> $GITHUB_OUTPUT

    cleanup:
        if: github.event.action == 'closed'
        runs-on: ubuntu-latest
        steps:
            - name: Log in to Azure
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Delete Azure App Service Slot
              uses: azure/CLI@v2
              with:
                  inlineScript: |
                      az webapp slot delete \
                        --name ${{ inputs.app-name }} \
                        --resource-group ${{ inputs.app-resource-group }} \
                        --slot ${{ env.SLOT_NAME }} \
                        --yes
