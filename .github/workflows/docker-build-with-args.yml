name: Build Docker Image with Args

on:
  workflow_call:
    inputs:
      docker_registry:
        description: "The Docker Registry to use"
        required: true
        type: string
      docker_container_name:
        description: "The Docker Container Name to use."
        required: true
        type: string
      docker_container_tag:
        description: "The Docker Container Tag to use."
        required: true
        type: string
      #
      docker_file_name:
        description: "The Dockerfile filename to use, relative to the repo root."
        required: false
        type: string
        default: "Dockerfile"
      #
      deploy_environment:
        description: "The Deploy Environment that should be passed to Docker during Build Phase. If not provided, it will be automagically determined based on branch name."
        required: false
        type: string
        default: ""
      branch_environment_map:
        description: "If provided, extracts the current Github Branch name from the provided JSON object"
        required: false
        type: string
        default: ""
      build_id:
        description: "The Build ID that should be passed to Docker during Build Phase."
        required: true
        type: string
    #
    outputs:
      docker_image_name:
        description: "Fully qualified Docker Image name. Like '{registry}/{container-name}:{tag}' "
        value: ${{ jobs.build_and_publish.outputs.image_fqn }}

env:
  DOCKER_BUILDKIT: 1

jobs:
  build_and_publish:
    name: Docker Build & Publish
    runs-on: ubuntu-latest
    env:
      CONTAINER_FQN: ${{ inputs.docker_registry }}/${{ inputs.docker_container_name }}:${{ inputs.docker_container_tag }}
    outputs:
      image_fqn: ${{ steps.set_output_step.outputs.image_fqn }}
    steps:
      # This checks out the repository so your workflow operates from root of repository
      - uses: actions/checkout@v6

      - name: Checkout helper scripts
        uses: actions/checkout@v6
        with:
          repository: Jockey/reusable-workflows
          ref: master # Can pin to a tag or SHA for stability/reproducibility
          sparse-checkout: |
            scripts/bash/extract-value-from-map.sh
          sparse-checkout-cone-mode: false
          path: .reusable-workflows

      - name: Determine Deploy Env
        run: |
          chmod +x ./.reusable-workflows/scripts/bash/extract-value-from-map.sh
          echo "DEPLOY_ENV=$(./.reusable-workflows/scripts/bash/extract-value-from-map.sh -k '${{ github.base_ref }}' -m '${{ inputs.branch_environment_map }}' -d '${{ inputs.deploy_environment }}')" >> $GITHUB_ENV

      - name: Check Deploy Env
        run: |
          if [ -z "${{ env.DEPLOY_ENV }}" ]; then
            echo "Error: DEPLOY_ENV is empty. Exiting."
            exit 1
          else
            echo "DEPLOY_ENV is: '${{ env.DEPLOY_ENV }}'"
          fi

      - name: Compute Cache Refs
        # Docker tags can't contain "/", but github.ref_name will contain
        # one for any branch with a slash in its name (e.g. "feature/foo").
        #
        # Cache is scoped per-branch to avoid different branches causing
        # thrashing by overwriting the same cache. Falls back to the
        # develop-branch cache below via an extra `cache-from` entry.
        run: |
          safe_branch=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "CACHE_IMAGE_REF=${{ inputs.docker_registry }}/${{ inputs.docker_container_name }}:buildcache-${safe_branch}" >> $GITHUB_ENV
          echo "CACHE_IMAGE_REF_FALLBACK=${{ inputs.docker_registry }}/${{ inputs.docker_container_name }}:buildcache-develop" >> $GITHUB_ENV

      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & Push Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.docker_file_name }}
          push: true
          # mode=max caches ALL layers (including intermediate/builder-stage
          # layers in multi-stage Dockerfiles), not just the ones in the
          # final image. mode=min (the old setting) skips those, so anything
          # built in an earlier stage (deps install, compile, etc.) was
          # re-running from scratch on every build.
          #
          # cache-from now checks two sources:
          #   1. type=gha   - GitHub's own cache backend; faster than a
          #                   registry round-trip (capped ~10GB/repo, LRU).
          #   2. type=registry (this branch) - your existing per-branch cache.
          #   3. type=registry (develop branch) - fallback so a brand-new
          #                   branch/PR still gets a warm cache instead of
          #                   starting cold.
          cache-from: |
            type=gha
            type=registry,ref=${{ env.CACHE_IMAGE_REF }}
            type=registry,ref=${{ env.CACHE_IMAGE_REF_FALLBACK }}
          cache-to: |
            type=gha,mode=max
            type=registry,mode=max,ref=${{ env.CACHE_IMAGE_REF }}
          tags: ${{ env.CONTAINER_FQN }}
          build-args: |
            DEPLOY_ENV=${{ env.DEPLOY_ENV }}
            BUILD_ID=${{ inputs.build_id }}

      # Set the output variable from the full Docker image name
      - name: Export Full Image Name
        id: set_output_step
        run: echo "image_fqn=${{ env.CONTAINER_FQN }}" >> $GITHUB_OUTPUT
